{% extends "base.html" %}

{% block title %}Tags | {{ SITENAME }}{% endblock %}

{% block canonical_url %}tags.html{% endblock %}

{% block content %}
      <h1 class="page-title">Tags</h1>
      <ul class="term-list">
        {% for tag, tag_articles in tags|sort(attribute='0.name') %}
        <li><a href="{{ SITEURL }}/{{ tag.url }}">#{{ tag }}</a><span class="term-count">{{ tag_articles|length }}</span></li>
        {% endfor %}
      </ul>
{% endblock %}
