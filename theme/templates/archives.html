{% extends "base.html" %}

{% block title %}Archives | {{ SITENAME }}{% endblock %}

{% block canonical_url %}archives.html{% endblock %}

{% block content %}
      <h1>Archives</h1>
      <hr>
      <dl class="row">
        {% for article in dates %}
        <dt class="col-sm-4">{{ article.locale_date }}</dt>
        <dd class="col-sm-8"><a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a></dd>
        {% endfor %}
      </dl>
{% endblock %}
